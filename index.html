<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>تهنئة يوم عرفة</title>

<meta property="og:title" content="تهنئة يوم عرفة 🤍" />
<meta property="og:description" content="دعوة صادقة في يوم عرفة من أحمد يونس" />
<meta property="og:image" content="./IMG_7143.jpeg?v=30" />
<meta property="og:type" content="website" />

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif;
  background:radial-gradient(circle at top,rgba(255,255,255,.35),transparent 35%),
  linear-gradient(135deg,#f8f4ec,#efe2cb,#d9c3a3);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:22px;
  color:#1c1c1e;
}

.card{
  width:100%;
  max-width:430px;
  background:rgba(255,255,255,.60);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-radius:36px;
  padding:32px 26px;
  text-align:center;
  box-shadow:0 25px 70px rgba(0,0,0,.16);
  animation:cardIn 1.1s ease both;
}

.profile-wrap{
  width:170px;
  height:170px;
  margin:0 auto 20px;
  border-radius:50%;
  padding:4px;
  background:linear-gradient(135deg,#fff9ef,#c79c52,#fff);
  box-shadow:0 15px 40px rgba(0,0,0,.18);
  opacity:0;
  transform:translateY(10px) scale(.95);
  animation:fadeUp .9s ease forwards;
  animation-delay:.2s;
}

.profile{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
  object-position:center 20%;
  border:3px solid rgba(255,255,255,.95);
  display:block;
}

.badge{
  display:inline-block;
  padding:9px 18px;
  border-radius:999px;
  background:rgba(255,255,255,.72);
  color:#6d5b42;
  font-size:13px;
  margin-bottom:22px;
  opacity:0;
  animation:fadeUp .8s ease forwards;
  animation-delay:.5s;
}

h1{
  margin:0 0 20px;
  font-size:30px;
  color:#1c1c1e;
  font-weight:700;
  opacity:0;
  animation:fadeUp .8s ease forwards;
  animation-delay:.8s;
}

.line{
  margin:0;
  line-height:2;
  font-size:18px;
  color:#3d3125;
  opacity:0;
  transform:translateY(12px);
  animation:fadeUp .8s ease forwards;
}

.line:nth-of-type(1){animation-delay:1.1s}
.line:nth-of-type(2){animation-delay:1.5s}
.line:nth-of-type(3){animation-delay:1.9s}
.line:nth-of-type(4){animation-delay:2.3s}

.dua{
  margin:28px 0;
  padding:22px;
  border-radius:26px;
  background:rgba(255,255,255,.58);
  line-height:2;
  font-size:17px;
  color:#2f2418;
  opacity:0;
  animation:fadeUp .9s ease forwards;
  animation-delay:2.8s;
}

.signature{
  margin-top:22px;
  color:#403427;
  font-size:17px;
  line-height:1.9;
  opacity:0;
  animation:fadeUp .9s ease forwards;
  animation-delay:3.4s;
}

.actions{
  display:flex;
  gap:12px;
  margin-top:30px;
  opacity:0;
  animation:fadeUp .9s ease forwards;
  animation-delay:4s;
}

button{
  flex:1;
  border:none;
  border-radius:18px;
  padding:15px 10px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
}

.share{background:#1c1c1e;color:white}
.copy{background:rgba(255,255,255,.82);color:#1c1c1e}

@keyframes fadeUp{
  to{opacity:1;transform:translateY(0) scale(1)}
}

@keyframes cardIn{
  from{opacity:0;transform:scale(.96) translateY(18px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}
</style>
</head>

<body>

<div class="card">

  <div class="profile-wrap">
    <img class="profile" src="./IMG_7143.jpeg?v=30" alt="أحمد يونس">
  </div>

  <div class="badge">٩ ذو الحجة • يوم عرفة 🤍</div>

  <h1>تهنئة يوم عرفة</h1>

  <p class="line">في هذا اليوم العظيم،</p>
  <p class="line">حيث تُرفع الدعوات وتتنزّل الرحمات،</p>
  <p class="line">أسأل الله أن يكتب لكم سكينة القلب،</p>
  <p class="line">وبركة السعي، وطمأنينة الأيام القادمة.</p>

  <div class="dua">
    لا إله إلا الله وحده لا شريك له،<br>
    له الملك وله الحمد،<br>
    وهو على كل شيء قدير.
  </div>

  <div class="signature">
    كل عام وأنتم بخير<br>
    أحمد يونس
  </div>

  <div class="actions">
    <button class="share" onclick="shareWhatsApp()">مشاركة واتساب</button>
    <button class="copy" onclick="copyLink()">نسخ الرابط</button>
  </div>

</div>

<script>
function shareWhatsApp(){
  const text = "تهنئة يوم عرفة 🤍\n\nدعوة صادقة في هذا اليوم المبارك\n\n" + window.location.href;
  window.open("https://wa.me/?text=" + encodeURIComponent(text), "_blank");
}

function copyLink(){
  navigator.clipboard.writeText(window.location.href);
  alert("تم نسخ الرابط 🤍");
}
</script>

</body>
</html>
